<!DOCTYPE html>
<html>
<head>
<title>Smart Resume Analyzer</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

/* Glass card */
.container{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
padding:30px;
border-radius:15px;
width:700px;
color:white;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* Title */
h2{
text-align:center;
margin-bottom:20px;
}

/* Textareas */
textarea{
width:100%;
height:120px;
margin-bottom:15px;
padding:10px;
border-radius:8px;
border:none;
font-size:14px;
}

textarea:focus{
outline:none;
box-shadow:0 0 8px rgba(255,255,255,0.8);
}

/* Animated button */
button{
padding:12px 20px;
width:100%;
background: linear-gradient(90deg,#ff9966,#ff5e62);
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* Result box */
.result{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
color:black;
}

/* Score colors */
.good{
color:green;
font-size:26px;
font-weight:bold;
}

.medium{
color:orange;
font-size:26px;
font-weight:bold;
}

.bad{
color:red;
font-size:26px;
font-weight:bold;
}

/* Missing skills highlight */
.missing{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Smart Resume Analyzer (ATS Checker)</h2>

<label>Paste Resume Content</label>
<textarea id="resume" placeholder="Paste your resume text"></textarea>

<label>Paste Job Description</label>
<textarea id="job" placeholder="Paste job description"></textarea>

<button onclick="analyzeResume()">Analyze Resume</button>

<div class="result" id="output"></div>

</div>

<script src="script.js"></script>

</body>
</html>
